# =============================================================================
# config/security.conf
# Configuracion de seguridad HTTP para produccion
# =============================================================================

# Oculta la version exacta de Apache en los headers HTTP
# Prod: solo muestra "Apache" sin version ni SO
ServerTokens Prod

# Elimina la firma del servidor en paginas de error generadas por Apache
ServerSignature Off

# Deshabilitar metodo TRACE (previene ataques Cross-Site Tracing)
TraceEnable Off
# =============================================================================
# config/httpd.conf
# Configuracion principal de Apache para produccion
# Basado en el httpd.conf de Fedora con ajustes de seguridad
# =============================================================================

ServerRoot "/etc/httpd"

# Puerto de escucha interno del contenedor
Listen 80

# Modulos esenciales
Include conf.modules.d/*.conf

# -----------------------------------------------------------------------------
# Usuario sin privilegios (definido en .env y pasado como ARG en Dockerfile)
# Apache abandona root tras el arranque inicial y corre como este usuario
# -----------------------------------------------------------------------------
User  webuser
Group webgroup

# Informacion del servidor
ServerAdmin root@localhost
ServerName localhost

# Ocultar nombre del host en redirects automaticos
UseCanonicalName Off

# Directorio raiz del servidor web
DocumentRoot "/var/www/html"

<Directory />
    AllowOverride none
    Require all denied
</Directory>

<Directory "/var/www/html">
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

# Archivos de bienvenida por orden de prioridad
<IfModule dir_module>
    DirectoryIndex index.php index.html
</IfModule>

# Denegar acceso a archivos .ht
<Files ".ht*">
    Require all denied
</Files>

# Logs redirigidos a stdout/stderr (configurado en Dockerfile)
ErrorLog  "logs/error_log"
LogLevel  warn

<IfModule log_config_module>
    LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
    LogFormat "%h %l %u %t \"%r\" %>s %b" common
    CustomLog "logs/access_log" combined
</IfModule>

<IfModule mime_module>
    TypesConfig /etc/mime.types
    AddType application/x-compress .Z
    AddType application/x-gzip .gz .tgz
    AddType application/x-httpd-php .php
</IfModule>

# Incluir configuraciones adicionales (security.conf entre ellas)
IncludeOptional conf.d/*.conf
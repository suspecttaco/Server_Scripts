# =============================================================================
# config/php-fpm.conf
# Configura Apache para pasar peticiones .php a php-fpm via FastCGI
# php-fpm escucha en socket Unix: /run/php-fpm/www.sock
# =============================================================================

# Activar el handler de proxy FastCGI para archivos .php
<FilesMatch \.php$>
    SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost"
</FilesMatch>
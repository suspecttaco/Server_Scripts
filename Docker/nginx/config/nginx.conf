# =============================================================================
# config/nginx.conf
# Configuracion principal de Nginx para produccion
# =============================================================================

user webuser webgroup;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Evita warning de types_hash en Fedora
    types_hash_max_size    4096;
    types_hash_bucket_size 64;

    # Oculta la version de Nginx en headers HTTP y paginas de error
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        root  /usr/share/nginx/html;
        index index.php index.html;

        # Deshabilitar metodo TRACE
        if ($request_method = TRACE) {
            return 405;
        }

        location / {
            try_files $uri $uri/ =404;
        }

        # Pasar peticiones .php a php-fpm via socket Unix
        location ~ \.php$ {
            fastcgi_pass  unix:/run/php-fpm/www.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include       fastcgi_params;
        }

        # Denegar acceso a archivos ocultos
        location ~ /\. {
            deny all;
        }
    }
}